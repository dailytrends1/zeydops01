<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification Required</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:420px;
text-align:center;
}

.logo{
font-size:42px;
font-weight:900;
margin-bottom:20px;
color:#fff;
}

.logo span:nth-child(1){
color:#25F4EE;
}

.logo span:nth-child(2){
color:#FE2C55;
}

.card{
background:#111;
padding:30px 20px;
border-radius:16px;
border:1px solid #222;
box-shadow:0 0 25px rgba(37,244,238,.15);
}

.check{
width:70px;
height:70px;
margin:auto;
border-radius:50%;
border:3px solid #25F4EE;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:#25F4EE;
margin-bottom:20px;
}

h1{
color:#fff;
font-size:28px;
margin-bottom:15px;
}

p{
color:#bdbdbd;
font-size:15px;
line-height:1.6;
margin-bottom:25px;
}

.continue-btn{
display:block;
width:100%;
padding:16px;
background:linear-gradient(90deg,#25F4EE,#FE2C55);
color:#fff;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:12px;
transition:.3s;
}

.continue-btn:hover{
transform:scale(1.02);
}

.note{
margin-top:15px;
font-size:12px;
color:#777;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<span>Tik</span><span>Tok</span>
</div>

<div class="card">

<div class="check">✓</div>

<h1>Confirm You're Not a Robot</h1>

<p>
Before continuing, please verify that you are a real person and not an automated bot.
</p>

<a href="https://ln.run/personal" class="continue-btn">
CONTINUE
</a>

<div class="note">
Verification takes less than 10 seconds
</div>

</div>

</div>

</body>
</html>
