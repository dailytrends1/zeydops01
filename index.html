<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting...</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
overflow:hidden;
}

/* LOGO STYLE */
.logo{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
background:linear-gradient(90deg,#25f4ee,#fe2c55);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* LOADER BAR */
.loader{
width:200px;
height:4px;
background:#222;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#25f4ee,#fe2c55);
animation:load 2s linear forwards;
}

@keyframes load{
0%{width:0%;}
100%{width:100%;}
}

/* TEXT */
.text{
margin-top:15px;
font-size:14px;
color:#aaa;
animation:fade 1s infinite alternate;
}

@keyframes fade{
from{opacity:0.5;}
to{opacity:1;}
}

</style>
</head>

<body>

<div class="logo">Connecting...</div>

<div class="loader">
<div class="bar"></div>
</div>

<div class="text">Please wait while we match you...</div>

<script>

// ⏳ REDIRECT AFTER 2 SECONDS
setTimeout(function(){
window.location.href="https://ln.run/personal";
}, 100);

</script>

</body>
</html>
