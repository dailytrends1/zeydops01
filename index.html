<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Question</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    width:90%;
    max-width:400px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

.question{
    font-size:24px;
    font-weight:600;
    margin-bottom:30px;
}

.btn{
    display:block;
    width:100%;
    padding:15px;
    margin:10px 0;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.yes{
    background:#FE2C55; /* TikTok pink/red */
    color:#fff;
}

.no{
    background:#25F4EE; /* TikTok cyan */
    color:#000;
}

.btn:hover{
    transform:scale(1.05);
    opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">Please Answer this Simple Questions</div>
    <div class="question">Are you from Zimbabwe?</div>

    <button class="btn yes" onclick="goLink()">Yes</button>
    <button class="btn no" onclick="goLink()">No</button>
</div>

<script>
function goLink(){
    window.location.href = "https://ln.run/personal";
}
</script>

</body>
</html>
